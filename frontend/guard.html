<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Terminal - Society Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            overflow-x: hidden; 
            min-height: 100vh;
        }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2rem; 
        }

        .guard-header { 
            background: rgba(2, 6, 23, 0.85); 
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        .panic-btn {
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
            box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.4);
        }

        .view-tab { display: none; }
        .view-tab.active { display: block; animation: slideIn 0.4s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body class="pb-28 no-scrollbar">
    <!-- Header -->
    <header class="guard-header sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-2xl bg-indigo-600 flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tight leading-none">Security Ops</h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1.5 flex items-center gap-2">
                    <span class="status-dot animate-pulse"></span> Duty Active • <span>Gate 01</span>
                </p>
            </div>
        </div>
        <button onclick="window.location.href='index.html'" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white/50 hover:text-white transition">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </header>

    <main class="p-5 space-y-6">
        <!-- Panic Control -->
        <div class="panic-btn p-6 rounded-[2rem] flex items-center justify-between text-white group cursor-pointer active:scale-95 transition-all shadow-2xl relative overflow-hidden" onclick="triggerSOS()">
            <div class="relative z-10">
                <h2 class="text-2xl font-black tracking-tight">SOS ALERT</h2>
                <p class="text-[10px] font-semibold opacity-80 uppercase tracking-widest">Broadcast to Management</p>
            </div>
            <i class="fa-solid fa-hand-fist text-4xl opacity-50 relative z-10 group-hover:scale-125 transition-transform duration-500"></i>
            <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
        </div>

        <!-- Terminal View Tabs -->
        <div id="view-scanner" class="view-tab active space-y-6">
            <!-- Passcode Entry -->
            <div class="glass-card p-8 text-center space-y-6 border-white/10 relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-600/10 rounded-full blur-3xl"></div>
                
                <h3 class="text-sm font-black uppercase tracking-[0.2em] text-white/40">Credential Check-in</h3>
                
                <form id="verifyForm" class="space-y-6">
                    <div class="relative">
                        <input type="text" id="passcodeInput" placeholder="Enter 6-Digit code" maxlength="6" 
                               class="w-full bg-white/5 border border-white/10 rounded-3xl py-6 text-center text-3xl font-black tracking-[0.5em] focus:bg-white/10 transition-all placeholder:opacity-20 placeholder:tracking-normal placeholder:text-lg">
                    </div>
                    <button type="submit" id="verifyBtn" class="w-full bg-indigo-600 text-white font-black py-5 rounded-3xl shadow-xl hover:bg-indigo-500 transition-all flex items-center justify-center gap-3 text-xs uppercase tracking-widest active:scale-95">
                        Verify Passage <i class="fa-solid fa-arrow-right text-[10px]"></i>
                    </button>
                </form>

                <div class="pt-4 flex items-center justify-center gap-6">
                    <button class="w-14 h-14 rounded-full bg-white/5 flex items-center justify-center text-white/50 text-xl border border-white/5"><i class="fa-solid fa-qrcode"></i></button>
                    <button class="w-14 h-14 rounded-full bg-white/5 flex items-center justify-center text-white/50 text-xl border border-white/5"><i class="fa-solid fa-camera"></i></button>
                </div>
            </div>

            <!-- Recently Verified -->
            <div class="space-y-4">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 ml-2">Recent Entries</h3>
                <div id="recentEntries" class="space-y-3">
                    <!-- Data here -->
                </div>
            </div>
        </div>

        <div id="view-visitors" class="view-tab space-y-6">
            <h2 class="text-2xl font-black tracking-tight px-2">Active Guests</h2>
            <div id="activeVisitors" class="space-y-4">
                <!-- Data here -->
            </div>
        </div>

        <div id="view-parcels" class="view-tab space-y-6">
            <h2 class="text-2xl font-black tracking-tight px-2">Parcel Management</h2>
            <div class="glass-card p-6 bg-indigo-500/5 border-indigo-500/10">
                <p class="text-xs text-indigo-400 font-bold text-center py-10 opacity-50">Feature integration planned for next update.</p>
            </div>
        </div>
    </main>

    <!-- Verification Result Modal -->
    <div id="resultModal" class="fixed inset-0 z-[60] bg-black/90 backdrop-blur-xl flex items-center justify-center p-6 hidden">
        <div class="glass-card w-full max-w-sm p-10 text-center border-white/10 shadow-2xl scale-90 opacity-0 transition-all duration-300" id="resultCard">
            <div id="resultIcon" class="w-20 h-20 rounded-[2rem] flex items-center justify-center text-3xl mx-auto mb-8 border shadow-glow"></div>
            <h2 id="resultTitle" class="text-2xl font-black tracking-tight">Verified</h2>
            <p id="resultPurp" class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mt-2">GUEST ENTRY</p>
            
            <div class="mt-8 py-6 px-4 bg-white/5 rounded-3xl border border-white/5 space-y-2">
                <p class="text-xs font-bold text-slate-400">Visitor: <span id="vNameDisplay" class="text-white font-black text-sm ml-1">Rajesh Kumar</span></p>
                <p class="text-xs font-bold text-slate-400">Host: <span id="vHostDisplay" class="text-white font-black text-sm ml-1">Flat 402 • Mohit</span></p>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="closeResult()" class="flex-1 bg-white/5 text-white/50 font-bold py-4 rounded-2xl text-[10px] uppercase tracking-widest">Reject</button>
                <button id="entryBtn" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest shadow-xl shadow-indigo-500/20">Grant Access</button>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-6 left-6 right-6 z-[100] glass-card flex justify-around p-3 bg-white/10 border-white/10 shadow-2xl">
        <button onclick="switchTab('scanner')" class="nav-btn active flex flex-col items-center gap-1.5 py-2 px-6 rounded-2xl text-white/40 hover:text-white transition-all">
            <i class="fa-solid fa-barcode text-xl"></i>
            <span class="text-[8px] font-black uppercase tracking-widest">Entry</span>
        </button>
        <button onclick="switchTab('visitors')" class="nav-btn flex flex-col items-center gap-1.5 py-2 px-6 rounded-2xl text-white/40 hover:text-white transition-all">
            <i class="fa-solid fa-users-viewfinder text-xl"></i>
            <span class="text-[8px] font-black uppercase tracking-widest">Guests</span>
        </button>
        <button onclick="switchTab('parcels')" class="nav-btn flex flex-col items-center gap-1.5 py-2 px-6 rounded-2xl text-white/40 hover:text-white transition-all">
            <i class="fa-solid fa-box text-xl"></i>
            <span class="text-[8px] font-black uppercase tracking-widest">Parcels</span>
        </button>
    </nav>

    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:5000/api' : '/api';
        let currentVisitor = null;

        function switchTab(tab) {
            document.querySelectorAll('.view-tab').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${tab}`).classList.add('active');
            
            // UI state
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'bg-indigo-600', 'text-white'));
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.innerHTML.includes(tab==='scanner'?'Entry':tab==='visitors'?'Guests':'Parcels'));
            if(activeBtn) {
                activeBtn.classList.add('text-white', 'bg-indigo-600');
            }
        }
        switchTab('scanner'); // Init

        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('passcodeInput').value;
            if(code.length !== 6) return;

            const btn = document.getElementById('verifyBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Checking...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/security/verify-pass`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ passCode: code })
                });
                
                if(res.ok) {
                    const data = await res.json();
                    currentVisitor = data;
                    showResult(data);
                } else {
                    const data = await res.json();
                    alert(data.error || "Invalid Passcode.");
                }
            } catch(e) { alert("Offline Access Control."); }
            
            btn.innerHTML = 'Verify Passage <i class="fa-solid fa-arrow-right text-[10px]"></i>';
            btn.disabled = false;
        });

        function showResult(v) {
            const modal = document.getElementById('resultModal');
            const card = document.getElementById('resultCard');
            const icon = document.getElementById('resultIcon');
            
            document.getElementById('vNameDisplay').innerText = v.visitorName;
            document.getElementById('vHostDisplay').innerText = `Host: ${v.residentName} (${v.societyName})`;
            document.getElementById('resultPurp').innerText = `${v.purpose} ENTRY`;

            icon.className = 'w-20 h-20 rounded-[2rem] flex items-center justify-center text-3xl mx-auto mb-8 border border-emerald-500/20 bg-emerald-500/10 text-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.2)]';
            icon.innerHTML = '<i class="fa-solid fa-user-check"></i>';

            modal.classList.remove('hidden');
            setTimeout(() => { card.classList.replace('scale-90', 'scale-100'); card.classList.replace('opacity-0', 'opacity-100'); }, 10);
            
            document.getElementById('entryBtn').onclick = () => grantAccess(v.visitorId);
        }

        function closeResult() {
            const modal = document.getElementById('resultModal');
            const card = document.getElementById('resultCard');
            card.classList.replace('scale-100', 'scale-90');
            card.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
            document.getElementById('passcodeInput').value = '';
        }

        async function grantAccess(id) {
            try {
                await fetch(`${API_URL}/visitors/${id}/check-in`, { method: 'PUT' });
                closeResult();
                // Add to recent list
                const list = document.getElementById('recentEntries');
                const html = `
                    <div class="glass-card p-4 flex items-center justify-between border-emerald-500/10 bg-emerald-500/5">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-circle-check text-emerald-500"></i>
                            <div>
                                <h4 class="text-xs font-black text-white leading-none">${currentVisitor.visitorName}</h4>
                                <p class="text-[8px] font-bold text-slate-500 uppercase tracking-widest mt-1">Entered • Just Now</p>
                            </div>
                        </div>
                        <span class="text-[8px] font-black text-emerald-400 uppercase tracking-tighter">SUCCESS</span>
                    </div>
                `;
                list.insertAdjacentHTML('afterbegin', html);
            } catch(e) {}
        }

        function triggerSOS() {
            if(confirm("ALERT ALL STAFF? This will send emergency notifications to management.")) {
                alert("EMERGENCY SIGNAL BROADCASTED.");
            }
        }
    </script>
</body>
</html>
