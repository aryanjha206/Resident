<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Society Market - Premium Home Shopping</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { primary: '#4F46E5', secondary: '#F43F5E', dark: '#0F172A', card: 'rgba(255, 255, 255, 0.8)' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .glass-header { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.3); position: sticky; top: 0; z-index: 100; }
        .product-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.5); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .category-chip { transition: all 0.3s; white-space: nowrap; }
        .category-chip.active { background: #4F46E5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .cart-sidebar { transition: transform 0.4s ease-out; transform: translateX(100%); }
        .cart-sidebar.open { transform: translateX(0); }
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Premium Header -->
    <header class="glass-header px-6 py-4 flex justify-between items-center group">
        <div class="flex items-center gap-3">
            <a href="index.html" class="w-10 h-10 rounded-2xl bg-white shadow-sm flex items-center justify-center text-slate-400 hover:text-primary transition active:scale-90">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="text-xl font-black tracking-tighter text-slate-900">Home Market</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1 group-hover:text-primary transition-colors">
                    <i class="fa-solid fa-location-dot text-rose-500"></i> Society Exclusive
                </p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleOrders()" class="relative w-12 h-12 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center shadow-sm hover:text-indigo-600 transition group/btn">
                <i class="fa-solid fa-receipt text-xl"></i>
                <p class="absolute -top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-[8px] font-bold px-2 py-1 rounded opacity-0 group-hover/btn:opacity-100 transition duration-300 pointer-events-none">My Orders</p>
            </button>
            <button onclick="toggleCart()" class="relative w-12 h-12 rounded-2xl bg-indigo-50 text-primary flex items-center justify-center shadow-sm hover:shadow-md transition">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 w-6 h-6 bg-rose-500 text-white text-[10px] font-black rounded-full flex items-center justify-center border-2 border-white shadow-lg scale-0 transition-transform duration-300">0</span>
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-5xl mx-auto w-full px-6 py-8">
        
        <!-- Search & Hero -->
        <div class="mb-10 group">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                <input type="text" id="marketSearch" oninput="filterProducts()" placeholder="What are you looking for today?" class="w-full bg-white border border-slate-100 rounded-3xl py-5 pl-14 pr-6 text-sm font-medium shadow-sm focus:outline-none focus:ring-4 focus:ring-primary/5 focus:border-primary transition-all">
            </div>
        </div>

        <!-- Categories Slider -->
        <div class="flex gap-3 overflow-x-auto pb-6 scroll-hide -mx-6 px-6" id="categoryList">
            <button onclick="changeCategory('All')" class="category-chip active px-6 py-3 rounded-2xl text-xs font-bold bg-white text-slate-500 border border-slate-100 shadow-sm active">All Items</button>
            <button onclick="changeCategory('Fresh & Grocery')" class="category-chip px-6 py-3 rounded-2xl text-xs font-bold bg-white text-slate-500 border border-slate-100 shadow-sm">Fresh & Grocery</button>
            <button onclick="changeCategory('Electronics')" class="category-chip px-6 py-3 rounded-2xl text-xs font-bold bg-white text-slate-500 border border-slate-100 shadow-sm">Electronics</button>
            <button onclick="changeCategory('Home & Kitchen')" class="category-chip px-6 py-3 rounded-2xl text-xs font-bold bg-white text-slate-500 border border-slate-100 shadow-sm">Home & Kitchen</button>
            <button onclick="changeCategory('Services')" class="category-chip px-6 py-3 rounded-2xl text-xs font-bold bg-white text-slate-500 border border-slate-100 shadow-sm">Services</button>
        </div>

        <!-- Products Grid -->
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Skeleton View -->
            <div class="bg-white rounded-[2rem] p-4 shimmer h-64"></div>
            <div class="bg-white rounded-[2rem] p-4 shimmer h-64"></div>
            <div class="bg-white rounded-[2rem] p-4 shimmer h-64"></div>
            <div class="bg-white rounded-[2rem] p-4 shimmer h-64"></div>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div id="cartOverlay" onclick="toggleCart()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[150] hidden opacity-0 transition-opacity duration-300"></div>
    <aside id="cartSidebar" class="cart-sidebar fixed top-0 right-0 h-screen w-full max-w-sm bg-white shadow-2xl z-[200] flex flex-col">
        <header class="p-6 flex justify-between items-center border-b border-slate-50">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-basket-shopping text-primary text-xl"></i>
                <h2 class="text-xl font-bold">Your Basket</h2>
            </div>
            <button onclick="toggleCart()" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-slate-100 transition">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </header>

        <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div id="emptyCart" class="h-full flex flex-col items-center justify-center text-center opacity-50">
                <img src="https://img.icons8.com/bubbles/200/shopping-cart.png" class="w-32 h-32 mb-4">
                <p class="text-sm font-bold text-slate-500">Your basket is empty.<br>Go fill it with goodness!</p>
            </div>
        </div>

        <footer class="p-8 bg-slate-50/50 border-t border-slate-100">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Subtotal</p>
                    <h3 id="totalPrice" class="text-3xl font-black text-slate-900">\u20b90</h3>
                </div>
                <p class="text-[10px] text-slate-400 font-medium">Society Delivery: <span class="text-emerald-500 font-bold">FREE</span></p>
            </div>
            <button onclick="checkout()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-[1.5rem] shadow-xl hover:bg-primary active:scale-[0.98] transition-all flex items-center justify-center gap-3 text-sm">
                Place Society Order <i class="fa-solid fa-arrow-right text-[10px] opacity-50"></i>
            </button>
        </footer>
    </aside>

    <!-- Order Tracking Sidebar -->
    <div id="orderOverlay" onclick="toggleOrders()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[150] hidden opacity-0 transition-opacity duration-300"></div>
    <aside id="orderSidebar" class="cart-sidebar fixed top-0 right-0 h-screen w-full max-w-sm bg-white shadow-2xl z-[200] flex flex-col">
        <header class="p-6 flex justify-between items-center bg-indigo-600 text-white">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-truck-fast text-xl"></i>
                <h2 class="text-xl font-bold">Track Orders</h2>
            </div>
            <button onclick="toggleOrders()" class="w-10 h-10 rounded-full bg-white/20 text-white flex items-center justify-center hover:bg-white/30 transition">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </header>
        <div id="orderHistoryList" class="flex-1 overflow-y-auto p-6 space-y-4">
             <div class="flex flex-col items-center justify-center h-40 opacity-30 italic text-sm">
                <i class="fa-solid fa-receipt text-3xl mb-2"></i>
                <p>Retrieving your order log...</p>
             </div>
        </div>
    </aside>

    <!-- Confirmation Overlay -->
    <div id="orderSuccess" class="fixed inset-0 z-[300] bg-indigo-600 flex flex-col items-center justify-center text-white hidden transform translate-y-full transition-transform duration-700">
        <div class="w-32 h-32 bg-white/20 rounded-full flex items-center justify-center text-6xl mb-8 animate-bounce relative">
             <i class="fa-solid fa-check"></i>
             <div class="absolute inset-0 rounded-full border-4 border-white/30 animate-ping"></div>
        </div>
        <h2 class="text-5xl font-black mb-3 tracking-tighter">Ordered!</h2>
        <p class="text-lg font-medium opacity-80 mb-10 max-w-[240px] text-center">Your items have been dispatched to the society hub.</p>
        <div class="flex flex-col w-full px-12 gap-3">
            <button onclick="viewTracking()" class="w-full bg-white text-indigo-600 py-5 rounded-[1.5rem] font-bold shadow-xl hover:scale-105 transition-transform active:scale-95">Track Status Now</button>
            <button onclick="closeSuccess()" class="w-full bg-indigo-500/50 text-white border border-white/20 py-5 rounded-[1.5rem] font-bold hover:bg-indigo-400/50 transition">Keep Shopping</button>
        </div>
    </div>

    <script>
        if(!localStorage.getItem('userToken')) window.location.href = 'index.html';
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:' ? 'http://localhost:5000/api' : '/api';
        let allProducts = [];
        let cart = [];
        try {
            const raw = localStorage.getItem('societyMarketCart');
            if (raw) cart = JSON.parse(raw);
            if (!Array.isArray(cart)) cart = [];
        } catch(e) {
            cart = [];
        }
        let currentCategory = 'All';

        function saveCart() {
            localStorage.setItem('societyMarketCart', JSON.stringify(cart));
        }

        const getAuthHeaders = () => ({
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('userToken')}`
        });

        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}/marketplace/products`, { headers: getAuthHeaders() });
                const data = await res.json();
                allProducts = Array.isArray(data) ? data : [];
                renderProducts();
            } catch (err) {
                console.error("Market fetch failed", err);
                allProducts = [];
                renderProducts();
            }
        }


        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const searchVal = document.getElementById('marketSearch').value.toLowerCase();
            
            const filtered = allProducts.filter(p => {
                const matchCat = currentCategory === 'All' || (p.category && p.category === currentCategory);
                const matchSearch = p.name.toLowerCase().includes(searchVal) || (p.description && p.description.toLowerCase().includes(searchVal));
                return matchCat && matchSearch;
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center opacity-40"><i class="fa-solid fa-magnifying-glass text-4xl mb-4"></i><p class="font-bold">No items match your search.</p></div>`;
                return;
            }

            grid.innerHTML = filtered.map((p, idx) => `
                <div class="product-card bg-white p-4 rounded-[2.5rem] flex flex-col group/card relative overflow-hidden">
                    <div class="relative h-44 rounded-[2rem] overflow-hidden mb-4 bg-slate-50">
                        <img src="${p.image || 'https://img.icons8.com/color/96/box--v1.png'}" class="w-full h-full object-cover group-hover/card:scale-110 transition-transform duration-700">
                        <span class="absolute top-4 right-4 bg-white/80 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-black text-slate-800 shadow-sm border border-white/50">\u20b9${p.price}</span>
                    </div>
                    <div class="px-1 flex-1">
                        <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-1">${p.category || 'General'}</p>
                        <h3 class="text-[13px] font-bold text-slate-900 group-hover/card:text-primary transition-colors leading-tight line-clamp-1">${p.name}</h3>
                        <p class="text-[10px] text-slate-400 mt-1 line-clamp-2 leading-relaxed min-h-[2.5rem]">${p.description || 'Verified society member product.'}</p>
                    </div>
                    ${(() => {
                        const inCart = cart.find(c => c._id === p._id);
                        if(inCart) return `
                            <button onclick="addToCartIndex(${idx})" class="mt-4 w-full bg-emerald-500 text-white py-3 rounded-2xl font-bold text-[11px] transition-all active:scale-[0.98] shadow-sm flex items-center justify-center gap-2">
                                In Basket (${inCart.qty}) <i class="fa-solid fa-check"></i>
                            </button>
                        `;
                        return `
                            <button onclick="addToCartIndex(${idx})" class="mt-4 w-full bg-slate-50 text-slate-700 py-3 rounded-2xl font-bold text-[11px] group-hover/card:bg-primary group-hover/card:text-white transition-all active:scale-[0.98] shadow-sm flex items-center justify-center gap-2">
                                Add to Basket <i class="fa-solid fa-plus opacity-50"></i>
                            </button>
                        `;
                    })()}
                    ${p.isNew ? '<div class="absolute top-0 left-0 bg-rose-500 text-white text-[8px] font-black px-4 py-1 rounded-br-2xl uppercase tracking-tighter">New</div>' : ''}
                </div>
            `).join('');
        }

        function filterProducts() {
            renderProducts();
        }

        function addToCartIndex(idx) {
            const p = allProducts.filter(p => {
                const searchVal = document.getElementById('marketSearch').value.toLowerCase();
                const matchCat = currentCategory === 'All' || (p.category && p.category === currentCategory);
                const matchSearch = p.name.toLowerCase().includes(searchVal) || (p.description && p.description.toLowerCase().includes(searchVal));
                return matchCat && matchSearch;
            })[idx];
            
            if(p) addToCart(p._id);
        }

        function changeCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-chip').forEach(c => {
                c.classList.remove('active');
                if (c.innerText === cat || (cat === 'All' && c.innerText === 'All Items')) c.classList.add('active');
            });
            renderProducts();
        }

        function toggleCart() {
            const side = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            side.classList.toggle('open');
            overlay.classList.toggle('hidden');
            setTimeout(() => overlay.classList.toggle('opacity-0'), 10);
            if(side.classList.contains('open')) renderCart();
        }

        function addToCart(pid) {
            const prod = allProducts.find(p => p._id === pid);
            const exists = cart.find(c => c._id === pid);
            if (exists) {
                exists.qty++;
            } else {
                cart.push({ ...prod, qty: 1 });
            }
            saveCart();
            updateCartCount();
            renderProducts();
            
            // Animation for cart count
            const count = document.getElementById('cartCount');
            count.classList.remove('scale-0');
            count.classList.add('scale-100');
        }

        function renderCart() {
            const itemBox = document.getElementById('cartItems');
            if (cart.length === 0) {
                itemBox.innerHTML = `<div id="emptyCart" class="h-full flex flex-col items-center justify-center text-center opacity-50 mt-20"><img src="https://img.icons8.com/bubbles/200/shopping-cart.png" class="w-32 h-32 mb-4"><p class="text-sm font-bold text-slate-500">Your basket is empty.<br>Go fill it with goodness!</p></div>`;
                document.getElementById('totalPrice').innerText = `\u20b90`;
                return;
            }

            let total = 0;
            itemBox.innerHTML = cart.map(c => {
                total += c.price * c.qty;
                return `
                    <div class="bg-slate-50/50 p-4 rounded-3xl flex gap-4 border border-slate-100 group/item">
                        <img src="${c.image || 'https://img.icons8.com/color/96/box--v1.png'}" class="w-16 h-16 rounded-2xl object-cover bg-white shadow-sm transition group-hover/item:scale-110">
                        <div class="flex-1">
                            <h4 class="text-sm font-bold text-slate-800 line-clamp-1">${c.name}</h4>
                            <p class="text-[10px] text-slate-400 font-bold mb-2">\u20b9${c.price} / item</p>
                            <div class="flex items-center gap-4">
                                <div class="flex items-center bg-white border border-slate-100 rounded-xl px-2 py-1 gap-4">
                                    <button onclick="adjustQty('${c._id}', -1)" class="w-6 h-6 flex items-center justify-center text-slate-400 hover:text-primary transition"><i class="fa-solid fa-minus text-[10px]"></i></button>
                                    <span class="text-[11px] font-black text-slate-700">${c.qty}</span>
                                    <button onclick="adjustQty('${c._id}', 1)" class="w-6 h-6 flex items-center justify-center text-slate-400 hover:text-primary transition"><i class="fa-solid fa-plus text-[10px]"></i></button>
                                </div>
                                <button onclick="removeFromCart('${c._id}')" class="text-rose-400 hover:text-rose-600 transition ml-auto"><i class="fa-solid fa-trash-can text-sm"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('totalPrice').innerText = `\u20b9${total.toLocaleString()}`;
        }

        function adjustQty(pid, delta) {
            const item = cart.find(c => c._id === pid);
            item.qty += delta;
            if (item.qty < 1) removeFromCart(pid);
            else {
                renderCart();
                saveCart();
                updateCartCount();
                renderProducts();
            }
        }

        function removeFromCart(pid) {
            cart = cart.filter(c => c._id !== pid);
            if(document.getElementById('cartSidebar').classList.contains('open')) renderCart();
            saveCart();
            updateCartCount();
            renderProducts();
        }

        function updateCartCount() {
            const count = cart.reduce((acc, c) => acc + c.qty, 0);
            const badge = document.getElementById('cartCount');
            badge.innerText = count;
            if (count > 0) badge.classList.remove('scale-0');
            else badge.classList.add('scale-0');
        }

        async function checkout() {
            if (cart.length === 0) return;
            
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                for (let item of cart) {
                    await fetch(`${API_URL}/marketplace/orders`, {
                        method: 'POST',
                        headers: getAuthHeaders(),
                        body: JSON.stringify({
                            productId: item._id,
                            productName: item.name,
                            productImage: item.image,
                            category: item.category,
                            price: item.price * item.qty
                        })
                    });
                }
                
                const successLayer = document.getElementById('orderSuccess');
                successLayer.classList.remove('hidden');
                setTimeout(() => {
                    successLayer.classList.remove('translate-y-full');
                }, 10);
                
                cart = [];
                saveCart();
                updateCartCount();
                renderProducts();
                fetchOrders(); // Pre-fetch for the tracker
            } catch (err) {
                alert("Order failed. Please check your connection.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function fetchOrders() {
            try {
                const res = await fetch(`${API_URL}/marketplace/orders`, { headers: getAuthHeaders() });
                const orders = await res.json();
                renderOrders(Array.isArray(orders) ? orders : []);
            } catch(e) {
                renderOrders([]);
            }
        }

        function renderOrders(orders) {
            const box = document.getElementById('orderHistoryList');
            if(orders.length === 0) {
                box.innerHTML = '<div class="text-center py-20 opacity-30 italic"><p>You haven\'t ordered anything yet.</p></div>';
                return;
            }

            box.innerHTML = orders.map(o => {
                let statusColor = 'text-primary bg-indigo-50 border-indigo-100';
                if(o.status === 'Delivered') statusColor = 'text-emerald-600 bg-emerald-50 border-emerald-100';
                if(o.status === 'Shipped') statusColor = 'text-amber-600 bg-amber-50 border-amber-100';

                return `
                    <div class="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm space-y-3 group hover:border-primary/20 transition">
                        <div class="flex gap-3">
                            <img src="${o.productImage || 'https://img.icons8.com/color/96/box--v1.png'}" class="w-12 h-12 rounded-xl object-cover bg-slate-50">
                            <div class="flex-1">
                                <h4 class="text-xs font-black text-slate-800">${o.productName}</h4>
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${new Date(o.createdAt).toLocaleDateString()}</p>
                            </div>
                            <span class="text-xs font-black text-slate-900">\u20b9${o.price}</span>
                        </div>
                        <div class="flex items-center justify-between pt-2 border-t border-slate-50">
                            <span class="text-[8px] font-black uppercase tracking-widest px-2.5 py-1 rounded-full border ${statusColor}">${o.status}</span>
                            <span class="text-[8px] font-bold text-slate-400">${o.paymentStatus === 'Paid' ? '\u2713 PAID' : '\u2022 UNPAID'}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleOrders() {
            const side = document.getElementById('orderSidebar');
            const overlay = document.getElementById('orderOverlay');
            side.classList.toggle('open');
            overlay.classList.toggle('hidden');
            setTimeout(() => overlay.classList.toggle('opacity-0'), 10);
            if(side.classList.contains('open')) fetchOrders();
        }

        function viewTracking() {
            closeSuccess();
            setTimeout(toggleOrders, 600);
        }

        function closeSuccess() {
            const successLayer = document.getElementById('orderSuccess');
            successLayer.classList.add('translate-y-full');
            setTimeout(() => {
                successLayer.classList.add('hidden');
                if(document.getElementById('cartSidebar').classList.contains('open')) toggleCart();
            }, 500);
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            fetchProducts();
            fetchOrders();
            updateCartCount(); // Reflect initial loaded cart
        });
    </script>
</body>
</html>
