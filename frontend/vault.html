<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Vault - Society Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #F8FAFC; 
            color: #1e293b; 
            overflow-x: hidden; 
            min-height: 100vh;
        }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6); 
            border-radius: 2.5rem; 
            box-shadow: 0 4px 25px -5px rgba(0, 0, 0, 0.05);
        }
        
        .premium-gradient { 
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); 
        }
        
        .vault-header { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05); 
        }

        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-hover:active {
            transform: scale(0.95);
        }
        
        select option { background: white; color: #1e293b; }
    </style>
</head>
<body class="pb-24 no-scrollbar">
    <!-- Background Decor -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[60%] h-[60%] bg-indigo-500/5 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[60%] h-[60%] bg-purple-500/5 rounded-full blur-[120px]"></div>
    </div>

    <!-- Header -->
    <header class="vault-header sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='index.html'" class="w-12 h-12 rounded-3xl bg-slate-100 flex items-center justify-center text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all border border-slate-200">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div>
                <h1 class="text-xl font-black tracking-tight text-slate-800">Security Vault</h1>
                <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Encrypted Storage
                </p>
            </div>
        </div>
        <div class="w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-500 flex items-center justify-center text-xl border border-indigo-100 shadow-sm">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
    </header>

    <main class="p-6 space-y-8 relative z-10">
        <!-- Summary Dashboard Card -->
        <div class="premium-gradient rounded-[2.5rem] p-10 text-white shadow-2xl relative overflow-hidden animate-fade-in shadow-indigo-200/50">
            <div class="relative z-10">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-4xl font-black text-white leading-tight tracking-tighter">Your Digital<br>Vault</h2>
                        <p class="text-indigo-100/70 text-[13px] mt-4 font-medium max-w-[240px] leading-relaxed">Securely store rentals, ID proofs, and society certificates with high-grade locally hosted storage.</p>
                    </div>
                </div>
                
                <div class="mt-10 flex gap-10">
                    <div>
                        <p class="text-[10px] font-black uppercase text-white/40 tracking-[0.2em] mb-1">Stored Assets</p>
                        <h4 id="docCount" class="text-3xl font-black text-white">0</h4>
                    </div>
                    <div>
                        <p class="text-[10px] font-black uppercase text-white/40 tracking-[0.2em] mb-1">Security</p>
                        <h4 class="text-lg font-black text-white flex items-center gap-2 mt-2">ACTIVE <i class="fa-solid fa-lock text-[10px]"></i></h4>
                    </div>
                </div>
            </div>
            <i class="fa-solid fa-vault absolute -bottom-8 -right-8 text-[180px] text-white opacity-10 rotate-12"></i>
        </div>

        <!-- Submission Hub -->
        <div class="space-y-4 animate-fade-in" style="animation-delay: 0.1s;">
            <div class="flex items-center justify-between px-2">
                <h3 class="text-[11px] font-black uppercase tracking-[0.25em] text-slate-400 mb-2">Sync New Document</h3>
                <i class="fa-solid fa-cloud-arrow-up text-indigo-400 text-sm"></i>
            </div>
            
            <div class="glass-card p-8 group border-slate-200/60">
                <form id="vaultForm" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Archive Category</label>
                        <div class="relative">
                            <select id="docType" class="w-full bg-slate-50 border border-slate-200 rounded-3xl py-5 px-6 text-sm font-bold text-slate-700 focus:ring-4 focus:ring-indigo-500/5 focus:bg-white focus:border-indigo-500/50 transition outline-none appearance-none cursor-pointer">
                                <option value="Rent Agreement">Rent Agreement</option>
                                <option value="ID Proof">ID Proof (Aadhar/PAN)</option>
                                <option value="Society Documents">Society Credentials</option>
                                <option value="Maintenance Receipt">Financial Receipt</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none group-focus-within:text-indigo-400 transition"></i>
                        </div>
                    </div>
                    
                    <div class="pt-2">
                        <label id="uploadLabel" class="flex flex-col items-center justify-center gap-5 w-full bg-slate-50 border-2 border-dashed border-slate-200 rounded-[2.5rem] py-12 cursor-pointer hover:bg-slate-100 hover:border-indigo-500/50 transition-all duration-500 group/upload relative overflow-hidden shadow-inner">
                            <div class="w-16 h-16 rounded-[1.5rem] bg-indigo-50 text-indigo-500 flex items-center justify-center text-3xl group-hover/upload:scale-110 group-hover/upload:rotate-3 transition duration-500 border border-indigo-100 shadow-sm">
                                <i class="fa-solid fa-id-card"></i>
                            </div>
                            <div class="text-center">
                                <p class="text-[15px] font-black text-slate-700 tracking-tight">Select File</p>
                                <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest leading-none">Max 5MB • PDF, JPG, PNG</p>
                            </div>
                            <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(this)">
                        </label>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-black py-5 rounded-[2rem] shadow-xl shadow-slate-200 active:scale-95 transition-all text-xs uppercase tracking-[0.2em] flex items-center justify-center gap-3 hover:bg-indigo-600">
                        DEPOSIT INTO Vault <i class="fa-solid fa-key text-[10px] opacity-40"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- Repository History -->
        <div class="space-y-4 animate-fade-in" style="animation-delay: 0.2s;">
            <div class="flex items-center justify-between px-2">
                <h3 class="text-[11px] font-black uppercase tracking-[0.25em] text-slate-400">Secure History</h3>
                <span class="text-[9px] font-black text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100">ALL SYNCED</span>
            </div>
            <div id="docList" class="space-y-4 pb-12">
                <!-- Data injected via JS -->
            </div>
        </div>
    </main>

    <!-- Toast Component -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass-card bg-slate-900 border-white/10 px-8 py-5 flex items-center gap-6 transition-all duration-500 translate-y-40 opacity-0 z-[100] w-[90%] max-w-sm shadow-2xl shadow-black/50 text-white">
        <div id="toastIcon" class="w-12 h-12 rounded-[1.25rem] flex items-center justify-center text-xl shrink-0 border"></div>
        <div>
            <h4 id="toastTitle" class="text-sm font-black tracking-tight"></h4>
            <p id="toastMsg" class="text-[10px] text-white/50 font-bold uppercase tracking-widest mt-0.5"></p>
        </div>
    </div>

    <!-- Doc View Modal -->
    <div id="viewModal" class="fixed inset-0 z-[6000] bg-slate-900/90 backdrop-blur-xl flex flex-col hidden items-center justify-center p-4">
        <div class="w-full max-w-4xl flex flex-col h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-white tracking-tight">Quick Preview</h3>
                <button onclick="closeDocView()" class="w-12 h-12 rounded-3xl bg-white/10 text-white flex items-center justify-center hover:bg-rose-500 transition-all active:scale-90 shadow-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex-1 rounded-[2.5rem] overflow-hidden bg-white shadow-2xl border border-white/10">
                <iframe id="docViewer" class="w-full h-full border-0"></iframe>
            </div>
        </div>
    </div>

    <script>
        if(!localStorage.getItem('userToken')) window.location.href = 'index.html';
        const isLocal = /^(localhost|127\.0\.0\.1|192\.168\.|10\.|172\.)/.test(window.location.hostname) || window.location.hostname === "";
        const API_URL = isLocal ? `http://${window.location.hostname || 'localhost'}:5000/api` : '/api';
        const getHeaders = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('userToken')}` });

        function showToast(title, msg, type='success') {
            const t = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            if(type === 'success') { 
                icon.className = 'w-12 h-12 rounded-[1.25rem] bg-emerald-500/10 text-emerald-400 flex items-center justify-center text-xl border-emerald-500/20'; 
                icon.innerHTML = '<i class="fa-solid fa-check"></i>'; 
            } else { 
                icon.className = 'w-12 h-12 rounded-[1.25rem] bg-rose-500/10 text-rose-400 flex items-center justify-center text-xl border-rose-500/20'; 
                icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; 
            }
            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastMsg').innerText = msg;
            t.classList.replace('translate-y-40', 'translate-y-0');
            t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => { 
                t.classList.replace('translate-y-0', 'translate-y-40'); 
                t.classList.replace('opacity-100', 'opacity-0'); 
            }, 3000);
        }

        let selectedFileBase64 = null;
        let selectedFileName = null;

        function handleFileSelect(input) {
            if(input.files && input.files[0]) {
                const file = input.files[0];
                selectedFileName = file.name;
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedFileBase64 = e.target.result;
                    const container = document.getElementById('uploadLabel');
                    container.querySelector('.text-slate-700').innerText = file.name;
                    container.querySelector('.text-slate-400').innerText = 'READIED FOR DEPOSIT';
                    container.classList.add('bg-indigo-50', 'border-indigo-200');
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('vaultForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!selectedFileBase64) { showToast("Empty Slot", "Select a file to secure.", "error"); return; }
            
            const btn = document.getElementById('submitBtn');
            const og = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ENCRYPTING...';
            btn.disabled = true;

            const payload = {
                documentType: document.getElementById('docType').value,
                fileName: selectedFileName,
                fileData: selectedFileBase64
            };

            try {
                const res = await fetch(`${API_URL}/vault/upload`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    showToast("Vault Updated", "Your asset has been locked.");
                    fetchDocs();
                    e.target.reset();
                    const container = document.getElementById('uploadLabel');
                    container.querySelector('.text-slate-700').innerText = 'Select File';
                    container.querySelector('.text-slate-400').innerText = 'Max 5MB • PDF, JPG, PNG';
                    container.classList.remove('bg-indigo-50', 'border-indigo-200');
                    selectedFileBase64 = null;
                }
            } catch(err) {
                showToast("Terminal Fault", "Connection timeout.", "error");
            }
            btn.innerHTML = og;
            btn.disabled = false;
        });

        async function fetchDocs() {
            try {
                const res = await fetch(`${API_URL}/vault/my-documents`, { headers: getHeaders() });
                const docs = await res.ok ? await res.json() : [];
                document.getElementById('docCount').innerText = docs.length;
                
                let html = '';
                docs.forEach((d) => {
                    html += `
                        <div class="glass-card p-6 flex items-center justify-between border-slate-200 hover:bg-slate-50 transition-all active:scale-[0.98]">
                            <div class="flex items-center gap-5">
                                <div class="w-14 h-14 rounded-2xl bg-indigo-50 text-indigo-500 flex items-center justify-center text-xl border border-indigo-100 shadow-sm"><i class="fa-solid fa-file-shield"></i></div>
                                <div>
                                    <h4 class="text-[15px] font-black text-slate-800 tracking-tight leading-none">${d.documentType}</h4>
                                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-2 flex items-center gap-1.5">${new Date(d.createdAt).toLocaleDateString()} • ${d.fileName.length > 15 ? d.fileName.substring(0,12)+'...' : d.fileName}</p>
                                </div>
                            </div>
                            <button onclick="viewDoc('${d.fileData}')" class="w-11 h-11 rounded-2xl bg-indigo-600 text-white flex items-center justify-center hover:bg-slate-900 transition-all shadow-lg active:scale-90"><i class="fa-solid fa-eye text-sm"></i></button>
                        </div>
                    `;
                });
                document.getElementById('docList').innerHTML = html || `
                    <div class="text-center py-16 opacity-30">
                        <i class="fa-solid fa-folder-open text-5xl mb-4 block"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">No documents found</p>
                    </div>`;
            } catch(err) {}
        }

        function viewDoc(data) {
            document.getElementById('docViewer').src = data;
            document.getElementById('viewModal').classList.remove('hidden');
        }

        function closeDocView() {
            document.getElementById('viewModal').classList.add('hidden');
            document.getElementById('docViewer').src = '';
        }

        fetchDocs();
    </script>
</body>
</html>
