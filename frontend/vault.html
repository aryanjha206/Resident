<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Vault - Society Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem; }
        .vault-header { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .primary-gradient { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
    </style>
</head>
<body class="pb-24">
    <!-- Header -->
    <header class="vault-header sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white/70 hover:text-white transition"><i class="fa-solid fa-arrow-left"></i></button>
            <div>
                <h1 class="text-xl font-black tracking-tight">Digital Vault</h1>
                <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Secure Documents</p>
            </div>
        </div>
        <div class="w-10 h-10 rounded-2xl bg-indigo-500/20 text-indigo-400 flex items-center justify-center text-xl"><i class="fa-solid fa-shield-halved"></i></div>
    </header>

    <main class="p-6 space-y-8">
        <!-- Summary Card -->
        <div class="glass-card p-8 primary-gradient shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-3xl font-black text-white leading-tight">Your Private Documents</h2>
                <p class="text-indigo-100/70 text-xs mt-2 font-medium">Encrypted and accessible only by you and the society admin.</p>
                <div class="mt-6 flex gap-6">
                    <div><p class="text-[9px] font-black uppercase text-indigo-200/50">Total Files</p><h4 id="docCount" class="text-2xl font-black text-white">0</h4></div>
                    <div><p class="text-[9px] font-black uppercase text-indigo-200/50">Security Level</p><h4 class="text-lg font-black text-white flex items-center gap-1.5 mt-1">Military <i class="fa-solid fa-check-circle text-xs"></i></h4></div>
                </div>
            </div>
            <i class="fa-solid fa-vault absolute top-4 right-4 text-[120px] opacity-10 rotate-12"></i>
        </div>

        <!-- Upload Section -->
        <div class="glass-card p-6">
            <h3 class="text-sm font-black uppercase tracking-widest text-white/50 mb-4 ml-1">New Submission</h3>
            <form id="vaultForm" class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-1">Document Type</label>
                    <select id="docType" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-sm font-bold text-white focus:ring-4 focus:ring-indigo-500/20 transition outline-none appearance-none">
                        <option value="Rent Agreement" class="bg-slate-900">Rent Agreement</option>
                        <option value="ID Proof" class="bg-slate-900">ID Proof (Aadhar/PAN)</option>
                        <option value="Society Documents" class="bg-slate-900">Society Forms</option>
                        <option value="Maintenance Receipt" class="bg-slate-900">Maintenance Receipt</option>
                    </select>
                </div>
                <div>
                    <label id="uploadLabel" class="flex flex-col items-center justify-center gap-3 w-full bg-white/5 border-2 border-dashed border-white/10 rounded-3xl py-8 cursor-pointer hover:bg-white/10 transition group">
                        <div class="w-12 h-12 rounded-2xl bg-indigo-500/20 text-indigo-400 flex items-center justify-center text-2xl group-hover:scale-110 transition duration-500"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                        <div class="text-center">
                            <p class="text-sm font-bold text-white">Upload Document</p>
                            <p class="text-[10px] text-white/40 mt-0.5">PDF, PNG or JPG (Max 5MB)</p>
                        </div>
                        <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(this)">
                    </label>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-white text-indigo-900 font-black py-4 rounded-3xl shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    Sync to Vault <i class="fa-solid fa-lock"></i>
                </button>
            </form>
        </div>

        <!-- History Section -->
        <div>
            <h3 class="text-sm font-black uppercase tracking-widest text-white/50 mb-4 ml-1">Safe Files</h3>
            <div id="docList" class="space-y-3"></div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass-card px-6 py-4 flex items-center gap-4 transition-all duration-500 translate-y-40 opacity-0 z-[100] w-[90%] max-w-sm">
        <div id="toastIcon" class="w-10 h-10 rounded-2xl flex items-center justify-center text-xl"></div>
        <div><h4 id="toastTitle" class="text-sm font-black"></h4><p id="toastMsg" class="text-[10px] text-white/50 font-medium"></p></div>
    </div>

    <script>
        if(!localStorage.getItem('userToken')) window.location.href = 'index.html';
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:5000/api' : '/api';
        const getHeaders = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('userToken')}` });

        function showToast(title, msg, type='success') {
            const t = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            if(type === 'success') { icon.className = 'w-10 h-10 rounded-2xl bg-emerald-500/20 text-emerald-400 flex items-center justify-center text-xl'; icon.innerHTML = '<i class="fa-solid fa-check-circle"></i>'; }
            else { icon.className = 'w-10 h-10 rounded-2xl bg-rose-500/20 text-rose-400 flex items-center justify-center text-xl'; icon.innerHTML = '<i class="fa-solid fa-times-circle"></i>'; }
            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastMsg').innerText = msg;
            t.classList.replace('translate-y-40', 'translate-y-0');
            t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => { t.classList.replace('translate-y-0', 'translate-y-40'); t.classList.replace('opacity-100', 'opacity-0'); }, 3000);
        }

        let selectedFileBase64 = null;
        let selectedFileName = null;

        function handleFileSelect(input) {
            if(input.files && input.files[0]) {
                const file = input.files[0];
                selectedFileName = file.name;
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedFileBase64 = e.target.result;
                    document.getElementById('uploadLabel').querySelector('.text-white').innerText = file.name;
                    document.getElementById('uploadLabel').querySelector('.text-white/40').innerText = (file.size/1024/1024).toFixed(2) + ' MB \u2022 Verified';
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('vaultForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!selectedFileBase64) { showToast("Missing File", "Please select a document to upload.", "error"); return; }
            
            const btn = document.getElementById('submitBtn');
            const og = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Encrypting...';
            btn.disabled = true;

            const payload = {
                documentType: document.getElementById('docType').value,
                fileName: selectedFileName,
                fileData: selectedFileBase64
            };

            try {
                const res = await fetch(`${API_URL}/vault/upload`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    showToast("Vault Updated", "Your document has been securely stored.");
                    fetchDocs();
                    e.target.reset();
                    document.getElementById('uploadLabel').querySelector('.text-white').innerText = 'Upload Document';
                    document.getElementById('uploadLabel').querySelector('.text-white/40').innerText = 'PDF, PNG or JPG (Max 5MB)';
                    selectedFileBase64 = null;
                }
            } catch(err) {}
            btn.innerHTML = og;
            btn.disabled = false;
        });

        async function fetchDocs() {
            try {
                const res = await fetch(`${API_URL}/vault/my-documents`, { headers: getHeaders() });
                const docs = await res.ok ? await res.json() : [];
                document.getElementById('docCount').innerText = docs.length;
                
                let html = '';
                docs.forEach(d => {
                    html += `
                        <div class="glass-card p-5 flex items-center justify-between group hover:bg-white/5 transition">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 text-indigo-400 flex items-center justify-center text-xl"><i class="fa-solid fa-file-shield"></i></div>
                                <div>
                                    <h4 class="text-sm font-bold text-white">${d.documentType}</h4>
                                    <p class="text-[9px] text-white/40 font-bold uppercase tracking-widest mt-0.5">${new Date(d.createdAt).toLocaleDateString()} \u2022 ${d.fileName}</p>
                                </div>
                            </div>
                            <button onclick="viewDoc('${d.fileData}')" class="w-10 h-10 rounded-full bg-white/5 text-white/40 flex items-center justify-center hover:text-white hover:bg-indigo-500 transition"><i class="fa-solid fa-eye"></i></button>
                        </div>
                    `;
                });
                document.getElementById('docList').innerHTML = html || '<p class="text-xs text-white/30 text-center py-10 italic">No documents in vault yet.</p>';
            } catch(err) {}
        }

        function viewDoc(data) {
            const win = window.open();
            win.document.write('<iframe src="' + data + '" frameborder="0" style="border:0; top:0px; left:0px; bottom:0px; right:0px; width:100%; height:100%;" allowfullscreen></iframe>');
        }

        fetchDocs();
    </script>
</body>
</html>
