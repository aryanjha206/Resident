<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Vault - Society Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #F8FAFC; 
            color: #1e293b; 
            overflow-x: hidden; 
            min-height: 100vh;
        }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6); 
            border-radius: 2.5rem; 
            box-shadow: 0 4px 25px -5px rgba(0, 0, 0, 0.05);
        }
        
        .premium-gradient { 
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); 
        }
        
        .vault-header { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05); 
        }

        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-hover:active {
            transform: scale(0.95);
        }
        
        select option { background: white; color: #1e293b; }
    </style>
    <script>
        window.addEventListener('load', () => {
            const ls = document.getElementById('loadingScreen');
            if(ls) {
                setTimeout(() => {
                    ls.style.opacity = '0';
                    setTimeout(() => ls.remove(), 750);
                }, 1000);
            }
        });
    </script>
</head>
<body class="pb-24 no-scrollbar">
    <!-- Initial Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 z-[10000] bg-[#020617] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="relative">
            <div class="absolute -inset-12 bg-indigo-500/20 rounded-full blur-[80px] animate-pulse"></div>
            <img src="icons/nivas.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3061/3061341.png'" class="w-24 h-24 relative z-10 animate-bounce shadow-2xl rounded-3xl" alt="Society Hub">
        </div>
        <div class="mt-8 flex flex-col items-center">
            <h2 class="text-white text-[10px] font-black tracking-[0.3em] uppercase opacity-40">Document Vault</h2>
            <div class="w-32 h-[1px] bg-white/5 rounded-full mt-5 overflow-hidden relative">
                <div class="absolute top-0 left-0 h-full bg-indigo-500 animate-[loading_2s_ease-in-out_infinite]" style="width: 30%"></div>
            </div>
        </div>
    </div>
    
    <style>
        @keyframes loading {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(350%); width: 30%; }
        }
    </style>
    <!-- Background Decor -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[60%] h-[60%] bg-indigo-500/5 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[60%] h-[60%] bg-purple-500/5 rounded-full blur-[120px]"></div>
    </div>

    <!-- Header -->
    <header class="vault-header sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='index.html'" class="w-10 h-10 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400 hover:text-indigo-600 transition-all border border-slate-100">
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </button>
            <h1 class="text-lg font-bold tracking-tight text-slate-800">My Vault</h1>
        </div>
        <div class="flex items-center gap-2 bg-indigo-50 px-3 py-1.5 rounded-xl border border-indigo-100">
            <i class="fa-solid fa-shield-halved text-indigo-500 text-xs"></i>
            <span class="text-[9px] font-black text-indigo-600 uppercase tracking-widest">SECURE</span>
        </div>
    </header>

    <main class="p-6 space-y-6 relative z-10 max-w-lg mx-auto">
        <!-- Summary Dashboard Card -->
        <div class="premium-gradient rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden animate-fade-in">
            <div class="relative z-10 flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-black text-white tracking-tighter">Repository</h2>
                    <p class="text-indigo-100/60 text-[10px] font-bold uppercase tracking-widest mt-1">Total Assets Locked</p>
                </div>
                <div class="text-right">
                    <h4 id="docCount" class="text-4xl font-black text-white leading-none">0</h4>
                </div>
            </div>
            <i class="fa-solid fa-vault absolute -bottom-6 -right-6 text-[120px] text-white opacity-10 rotate-12"></i>
        </div>

        <!-- Submission Hub -->
        <div class="animate-fade-in" style="animation-delay: 0.1s;">
            <div class="glass-card p-6 border-slate-100 shadow-sm shadow-indigo-100/10">
                <form id="vaultForm" class="space-y-5">
                    <div class="grid grid-cols-1 gap-4">
                        <select id="docType" class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-5 text-[13px] font-bold text-slate-700 focus:ring-4 focus:ring-indigo-500/5 focus:bg-white transition outline-none appearance-none cursor-pointer">
                            <option value="Rent Agreement">Rent Agreement</option>
                            <option value="ID Proof">Aadhar / PAN Card</option>
                            <option value="Society Documents">Society Papers</option>
                            <option value="Maintenance Receipt">Financial Stats</option>
                        </select>
                        
                        <label id="uploadLabel" class="flex items-center gap-4 w-full bg-slate-50 border border-dashed border-slate-200 rounded-2xl p-4 cursor-pointer hover:bg-slate-100 transition-all group/upload">
                            <div class="w-12 h-12 rounded-xl bg-white text-indigo-500 flex items-center justify-center text-xl shadow-sm border border-slate-100 transition-transform group-hover/upload:scale-105">
                                <i class="fa-solid fa-cloud-arrow-up"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-[13px] font-bold text-slate-700 truncate">Tap to Select File</p>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">PDF, Image (Max 5MB)</p>
                            </div>
                            <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(this)">
                        </label>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-xs uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-indigo-600">
                        Secure Upload <i class="fa-solid fa-lock text-[10px]"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- Repository History -->
        <div class="space-y-4 animate-fade-in" style="animation-delay: 0.2s;">
            <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400 px-1">Recent Deposits</h3>
            <div id="docList" class="grid grid-cols-1 gap-3 pb-12">
                <!-- Data injected via JS -->
            </div>
        </div>
    </main>

    <!-- Toast Component -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass-card bg-slate-900 border-white/10 px-6 py-4 flex items-center gap-4 transition-all duration-500 translate-y-40 opacity-0 z-[100] w-[90%] max-w-sm shadow-2xl shadow-black/50 text-white">
        <div id="toastIcon" class="w-10 h-10 rounded-xl flex items-center justify-center text-lg shrink-0 border"></div>
        <div>
            <h4 id="toastTitle" class="text-[13px] font-bold tracking-tight leading-none"></h4>
            <p id="toastMsg" class="text-[9px] text-white/50 font-bold uppercase tracking-widest mt-1.5"></p>
        </div>
    </div>

    <!-- Doc View Modal -->
    <div id="viewModal" class="fixed inset-0 z-[6000] bg-slate-900/90 backdrop-blur-xl flex flex-col hidden items-center justify-center p-4">
        <div class="w-full max-w-4xl flex flex-col h-[85vh]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-white tracking-tight">Preview</h3>
                <button onclick="closeDocView()" class="w-10 h-10 rounded-2xl bg-white/10 text-white flex items-center justify-center hover:bg-rose-500 transition-all active:scale-95"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex-1 rounded-3xl overflow-hidden bg-white shadow-2xl">
                <iframe id="docViewer" class="w-full h-full border-0"></iframe>
            </div>
        </div>
    </div>
</main>
    <!-- Toast Component -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 glass-card bg-slate-900 border-white/10 px-6 py-4 flex items-center gap-4 transition-all duration-500 translate-y-40 opacity-0 z-[100] w-[90%] max-w-sm shadow-2xl shadow-black/50 text-white">
        <div id="toastIcon" class="w-10 h-10 rounded-xl flex items-center justify-center text-lg shrink-0 border"></div>
        <div>
            <h4 id="toastTitle" class="text-[13px] font-bold tracking-tight leading-none"></h4>
            <p id="toastMsg" class="text-[9px] text-white/50 font-bold uppercase tracking-widest mt-1.5"></p>
        </div>
    </div>

    <!-- Doc View Modal -->
    <div id="viewModal" class="fixed inset-0 z-[6000] bg-slate-900/90 backdrop-blur-xl flex flex-col hidden items-center justify-center p-4">
        <div class="w-full max-w-4xl flex flex-col h-[85vh]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-white tracking-tight">Preview</h3>
                <button onclick="closeDocView()" class="w-10 h-10 rounded-2xl bg-white/10 text-white flex items-center justify-center hover:bg-rose-500 transition-all active:scale-95"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex-1 rounded-3xl overflow-hidden bg-white shadow-2xl">
                <iframe id="docViewer" class="w-full h-full border-0"></iframe>
            </div>
        </div>
    </div>

    <script>
        if(!localStorage.getItem('userToken')) window.location.href = 'index.html';
        const isLocal = /^(localhost|127\.0\.0\.1|192\.168\.|10\.|172\.)/.test(window.location.hostname) || window.location.hostname === "";
        const API_URL = isLocal ? `http://${window.location.hostname || 'localhost'}:5000/api` : '/api';
        const getHeaders = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('userToken')}` });

        function showToast(title, msg, type='success') {
            const t = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            if(type === 'success') { 
                icon.className = 'w-12 h-12 rounded-[1.25rem] bg-emerald-500/10 text-emerald-400 flex items-center justify-center text-xl border-emerald-500/20'; 
                icon.innerHTML = '<i class="fa-solid fa-check"></i>'; 
            } else { 
                icon.className = 'w-12 h-12 rounded-[1.25rem] bg-rose-500/10 text-rose-400 flex items-center justify-center text-xl border-rose-500/20'; 
                icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; 
            }
            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastMsg').innerText = msg;
            t.classList.replace('translate-y-40', 'translate-y-0');
            t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => { 
                t.classList.replace('translate-y-0', 'translate-y-40'); 
                t.classList.replace('opacity-100', 'opacity-0'); 
            }, 3000);
        }

        let selectedFileBase64 = null;
        let selectedFileName = null;

        function handleFileSelect(input) {
            if(input.files && input.files[0]) {
                const file = input.files[0];
                selectedFileName = file.name;
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedFileBase64 = e.target.result;
                    const container = document.getElementById('uploadLabel');
                    container.querySelector('.text-slate-700').innerText = file.name;
                    container.querySelector('.text-slate-400').innerText = 'READIED FOR DEPOSIT';
                    container.classList.add('bg-indigo-50', 'border-indigo-200');
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('vaultForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!selectedFileBase64) { showToast("Empty Slot", "Select a file to secure.", "error"); return; }
            
            const btn = document.getElementById('submitBtn');
            const og = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ENCRYPTING...';
            btn.disabled = true;

            const payload = {
                documentType: document.getElementById('docType').value,
                fileName: selectedFileName,
                fileData: selectedFileBase64
            };

            try {
                const res = await fetch(`${API_URL}/vault/upload`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    showToast("Vault Updated", "Your asset has been locked.");
                    fetchDocs();
                    e.target.reset();
                    const container = document.getElementById('uploadLabel');
                    container.querySelector('.text-slate-700').innerText = 'Select File';
                    container.querySelector('.text-slate-400').innerText = 'Max 5MB • PDF, JPG, PNG';
                    container.classList.remove('bg-indigo-50', 'border-indigo-200');
                    selectedFileBase64 = null;
                }
            } catch(err) {
                showToast("Terminal Fault", "Connection timeout.", "error");
            }
            btn.innerHTML = og;
            btn.disabled = false;
        });

        async function fetchDocs() {
            try {
                const res = await fetch(`${API_URL}/vault/my-documents`, { headers: getHeaders() });
                const docs = await res.ok ? await res.json() : [];
                document.getElementById('docCount').innerText = docs.length;
                
                let html = '';
                docs.forEach((d) => {
                    html += `
                        <div class="glass-card p-6 flex items-center justify-between border-slate-200 hover:bg-slate-50 transition-all active:scale-[0.98]">
                            <div class="flex items-center gap-5">
                                <div class="w-14 h-14 rounded-2xl bg-indigo-50 text-indigo-500 flex items-center justify-center text-xl border border-indigo-100 shadow-sm"><i class="fa-solid fa-file-shield"></i></div>
                                <div>
                                    <h4 class="text-[15px] font-black text-slate-800 tracking-tight leading-none">${d.documentType}</h4>
                                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-2 flex items-center gap-1.5">${new Date(d.createdAt).toLocaleDateString()} • ${d.fileName.length > 15 ? d.fileName.substring(0,12)+'...' : d.fileName}</p>
                                </div>
                            </div>
                            <button onclick="viewDoc('${d.fileData}')" class="w-11 h-11 rounded-2xl bg-indigo-600 text-white flex items-center justify-center hover:bg-slate-900 transition-all shadow-lg active:scale-90"><i class="fa-solid fa-eye text-sm"></i></button>
                        </div>
                    `;
                });
                document.getElementById('docList').innerHTML = html || `
                    <div class="text-center py-16 opacity-30">
                        <i class="fa-solid fa-folder-open text-5xl mb-4 block"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">No documents found</p>
                    </div>`;
            } catch(err) {}
        }

        function viewDoc(data) {
            document.getElementById('docViewer').src = data;
            document.getElementById('viewModal').classList.remove('hidden');
        }

        function closeDocView() {
            document.getElementById('viewModal').classList.add('hidden');
            document.getElementById('docViewer').src = '';
        }

        fetchDocs();
    </script>
</body>
</html>
