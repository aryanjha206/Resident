<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Vault | Society Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        obsidian: '#020617',
                        glass: 'rgba(255, 255, 255, 0.03)',
                        'glass-border': 'rgba(255, 255, 255, 0.1)',
                        primary: '#6366f1',
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .obsidian-gradient {
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.1), transparent);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }

        .primary-glow {
            box-shadow: 0 0 40px -5px rgba(99, 102, 241, 0.4);
        }

        .shimmer {
            position: relative;
            overflow: hidden;
        }

        .shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 45%,
                rgba(255, 255, 255, 0.05) 50%,
                transparent 55%
            );
            animation: shimmer 10s infinite linear;
        }

        @keyframes shimmer {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }

        .doc-item {
            animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body class="pb-12 min-h-screen obsidian-gradient">
    <!-- Immersive Background Orbs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-indigo-600/10 rounded-full blur-[120px] animate-pulse-slow"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-purple-600/10 rounded-full blur-[120px] animate-pulse-slow" style="animation-delay: 2s;"></div>
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-[0.02]"></div>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-50 px-6 py-6 transition-all duration-300" id="mainHeader">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="w-11 h-11 rounded-2xl glass-card flex items-center justify-center text-white/70 hover:text-white hover:border-white/20 transition-all active:scale-90">
                    <i class="fa-solid fa-chevron-left text-sm"></i>
                </button>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-white">Digital Vault</h1>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        <p class="text-[10px] font-bold text-white/40 uppercase tracking-[0.2em]">End-to-End Encrypted</p>
                    </div>
                </div>
            </div>
            <div class="group relative">
                <div class="absolute inset-0 bg-primary blur-lg opacity-20 group-hover:opacity-40 transition-opacity"></div>
                <div class="w-12 h-12 rounded-2xl glass-card border-white/10 text-primary flex items-center justify-center text-xl relative overflow-hidden shimmer">
                    <i class="fa-solid fa-shield-halved group-hover:scale-110 transition-transform duration-500"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="relative z-10 px-6 pt-2 space-y-8 max-w-lg mx-auto">
        <!-- Dashboard Card -->
        <div class="glass-card rounded-[2.5rem] p-8 relative overflow-hidden border-white/10 shadow-2xl group">
            <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-3xl -mr-16 -mt-16 group-hover:bg-primary/20 transition-colors"></div>
            
            <div class="relative z-10">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-3xl font-black text-white leading-tight tracking-tight">Secured Storage</h2>
                        <p class="text-white/40 text-[11px] mt-2 font-medium max-w-[200px] leading-relaxed">Your vital documents are stored in an isolated society node.</p>
                    </div>
                    <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
                        <i class="fa-solid fa-server text-indigo-400/60 text-xl"></i>
                    </div>
                </div>

                <div class="mt-8 grid grid-cols-2 gap-4">
                    <div class="bg-white/5 border border-white/5 p-4 rounded-3xl hover:bg-white/10 transition-colors">
                        <p class="text-[9px] font-black uppercase text-white/30 tracking-widest mb-1 leading-none">Total Files</p>
                        <h4 id="docCount" class="text-3xl font-black text-white leading-none">0</h4>
                    </div>
                    <div class="bg-white/5 border border-white/5 p-4 rounded-3xl hover:bg-white/10 transition-colors">
                        <p class="text-[9px] font-black uppercase text-white/30 tracking-widest mb-1 leading-none">Integrity</p>
                        <h4 class="text-lg font-black text-emerald-400 leading-none mt-2 flex items-center gap-1.5">Verified <i class="fa-solid fa-circle-check text-[10px]"></i></h4>
                    </div>
                </div>
            </div>
            
            <!-- Floating Background Icon -->
            <i class="fa-solid fa-vault absolute -bottom-8 -right-8 text-[140px] text-white/[0.03] -rotate-12 pointer-events-none group-hover:rotate-0 group-hover:scale-110 transition-all duration-1000"></i>
        </div>

        <!-- Upload Section -->
        <div class="relative">
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 mb-5 ml-1">Submit Document</h3>
            <div class="glass-card p-4 rounded-[2.5rem] border-white/5 shadow-inner">
                <form id="vaultForm" class="space-y-4">
                    <div class="relative">
                        <i class="fa-solid fa-folder-open absolute left-5 top-1/2 -translate-y-1/2 text-white/20 text-sm"></i>
                        <select id="docType" class="w-full glass-input rounded-3xl py-4.5 pl-12 pr-10 text-sm font-bold text-white focus:outline-none appearance-none cursor-pointer">
                            <option value="Rent Agreement" class="bg-obsidian">Rent Agreement</option>
                            <option value="ID Proof" class="bg-obsidian">Government ID Proof</option>
                            <option value="Society Documents" class="bg-obsidian">Society Compliance Form</option>
                            <option value="Maintenance Receipt" class="bg-obsidian">Maintenance Receipt</option>
                            <option value="Other" class="bg-obsidian">Other Document</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-white/20 text-[10px] pointer-events-none"></i>
                    </div>

                    <div id="dropZone" class="group/drop">
                        <label id="uploadLabel" class="flex flex-col items-center justify-center gap-4 w-full glass-card bg-transparent border-2 border-dashed border-white/10 rounded-[2rem] py-10 cursor-pointer hover:border-primary/40 hover:bg-primary/5 transition-all duration-500">
                            <div class="w-16 h-16 rounded-2xl bg-primary/10 text-primary flex items-center justify-center text-3xl group-hover/drop:scale-110 group-hover/drop:rotate-6 transition-all duration-500 shadow-lg">
                                <i class="fa-solid fa-cloud-arrow-up"></i>
                            </div>
                            <div class="text-center">
                                <p id="fileNameDisplay" class="text-sm font-bold text-white group-hover/drop:text-primary transition-colors">Select Archive</p>
                                <p id="fileSizeDisplay" class="text-[10px] text-white/30 mt-1 font-medium italic">Max 10MB \u2022 PDF, IMG</p>
                            </div>
                            <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(this)" accept=".pdf,image/*">
                        </label>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-white text-obsidian font-black py-4.5 rounded-3xl shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3 hover:bg-primary hover:text-white group">
                        Encrypt & Store <i class="fa-solid fa-lock text-sm opacity-40 group-hover:opacity-100 transition-opacity"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- History/List Section -->
        <div class="pb-8">
            <div class="flex justify-between items-center mb-6 ml-1">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-white/30">Vault History</h3>
                <button onclick="fetchDocs()" class="text-[9px] font-black text-primary uppercase tracking-widest flex items-center gap-2 hover:opacity-70 transition">
                    Sync <i class="fa-solid fa-rotate text-[8px]"></i>
                </button>
            </div>
            
            <div id="docList" class="space-y-4">
                <!-- Skeleton Loader -->
                <div class="animate-pulse space-y-4">
                    <div class="h-20 bg-white/5 rounded-3xl"></div>
                    <div class="h-20 bg-white/5 rounded-3xl opacity-50"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Document Preview Modal (Enhanced) -->
    <div id="previewModal" class="fixed inset-0 z-[100] bg-obsidian/90 backdrop-blur-xl hidden flex flex-col transition-all duration-500 opacity-0 translate-y-10">
        <header class="p-6 flex justify-between items-center glass-card border-none bg-white/5 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-2xl bg-primary/20 text-primary flex items-center justify-center">
                    <i class="fa-solid fa-file-shield text-xl"></i>
                </div>
                <div>
                    <h4 id="previewTitle" class="text-sm font-black text-white">Document View</h4>
                    <p id="previewDetail" class="text-[10px] text-white/40 font-bold uppercase tracking-widest mt-0.5">Society Hub Crypt-Node</p>
                </div>
            </div>
            <button onclick="closePreview()" class="w-10 h-10 rounded-2xl glass-card border-white/10 text-white/70 flex items-center justify-center hover:bg-rose-500/20 hover:text-rose-400 transition-all">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </header>
        <div class="flex-1 p-4 bg-obsidian/50 relative overflow-hidden">
            <iframe id="previewIframe" class="w-full h-full rounded-2xl border border-white/5 shadow-2xl relative z-10" frameborder="0"></iframe>
            <div class="absolute inset-0 flex items-center justify-center -z-0">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-primary/30"></i>
            </div>
        </div>
        <footer class="p-6 flex gap-4">
            <button onclick="downloadCurrentDoc()" class="flex-1 bg-white/5 border border-white/10 text-white font-bold py-4 rounded-3xl hover:bg-white/10 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-download text-xs text-primary"></i> Download
            </button>
            <button onclick="closePreview()" class="flex-1 bg-primary text-white font-bold py-4 rounded-3xl shadow-xl hover:shadow-primary/20 transition-all">
                Close Viewer
            </button>
        </footer>
    </div>

    <!-- Floating Global Toast -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 glass-card px-6 py-4 rounded-3xl flex items-center gap-4 transition-all duration-700 -translate-y-40 opacity-0 z-[200] border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.5)] min-w-[280px]">
        <div id="toastIcon" class="w-11 h-11 rounded-2xl flex items-center justify-center text-xl"></div>
        <div>
            <h4 id="toastTitle" class="text-[13px] font-black text-white leading-none mb-1"></h4>
            <p id="toastMsg" class="text-[10px] text-white/40 font-bold tracking-tight"></p>
        </div>
    </div>

    <script>
        // Authentication check
        if(!localStorage.getItem('userToken')) window.location.href = 'index.html';
        
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:5000/api' : '/api';
        const getHeaders = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('userToken')}` });

        let currentViewData = null;
        let currentViewName = null;

        function showToast(title, msg, type='success') {
            const t = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            
            if(type === 'success') { 
                icon.className = 'w-11 h-11 rounded-2xl bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 shadow-[0_0_15px_rgba(16,185,129,0.1)]'; 
                icon.innerHTML = '<i class="fa-solid fa-check"></i>'; 
            } else { 
                icon.className = 'w-11 h-11 rounded-2xl bg-rose-500/10 text-rose-400 border border-rose-500/20 shadow-[0_0_15px_rgba(244,63,94,0.1)]'; 
                icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>'; 
            }
            
            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastMsg').innerText = msg;
            
            t.classList.remove('-translate-y-40', 'opacity-0');
            t.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => { 
                t.classList.add('-translate-y-40', 'opacity-0');
                t.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        // Handle Header Scroll Effect
        window.addEventListener('scroll', () => {
            const header = document.getElementById('mainHeader');
            if (window.scrollY > 20) {
                header.classList.add('bg-obsidian/80', 'backdrop-blur-xl', 'border-b', 'border-white/5');
            } else {
                header.classList.remove('bg-obsidian/80', 'backdrop-blur-xl', 'border-b', 'border-white/5');
            }
        });

        let selectedFileBase64 = null;
        let selectedFileName = null;

        function handleFileSelect(input) {
            if(input.files && input.files[0]) {
                const file = input.files[0];
                if(file.size > 10 * 1024 * 1024) {
                    showToast("File Too Large", "Maximum allowed size is 10MB.", "error");
                    input.value = '';
                    return;
                }
                
                selectedFileName = file.name;
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedFileBase64 = e.target.result;
                    document.getElementById('fileNameDisplay').innerText = file.name;
                    document.getElementById('fileSizeDisplay').innerText = (file.size/1024/1024).toFixed(2) + ' MB \u2022 Secure Sync Ready';
                    document.getElementById('dropZone').querySelector('label').classList.add('border-primary/50', 'bg-primary/5');
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('vaultForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!selectedFileBase64) { 
                showToast("Identity Required", "Please select a file to finalize encryption.", "error"); 
                return; 
            }
            
            const btn = document.getElementById('submitBtn');
            const og = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Encrypting...';
            btn.disabled = true;

            const payload = {
                documentType: document.getElementById('docType').value,
                fileName: selectedFileName,
                fileData: selectedFileBase64
            };

            try {
                const res = await fetch(`${API_URL}/vault/upload`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(payload)
                });
                
                if(res.ok) {
                    showToast("Quantum Sync Success", "Your document has been fragmented and secured.");
                    fetchDocs();
                    e.target.reset();
                    document.getElementById('fileNameDisplay').innerText = 'Select Archive';
                    document.getElementById('fileSizeDisplay').innerText = 'Max 10MB \u2022 PDF, IMG';
                    document.getElementById('dropZone').querySelector('label').classList.remove('border-primary/50', 'bg-primary/5');
                    selectedFileBase64 = null;
                } else {
                    const err = await res.json();
                    showToast("Vault Error", err.error || "Uplink failure.", "error");
                }
            } catch(err) {
                showToast("System Crash", "Network stability issues detected.", "error");
            }
            
            btn.innerHTML = og;
            btn.disabled = false;
        });

        async function fetchDocs() {
            const list = document.getElementById('docList');
            try {
                const res = await fetch(`${API_URL}/vault/my-documents`, { headers: getHeaders() });
                const docs = res.ok ? await res.json() : [];
                document.getElementById('docCount').innerText = docs.length;
                
                if(docs.length === 0) {
                    list.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-20 text-center space-y-6">
                            <div class="w-24 h-24 rounded-[2rem] glass-card border-white/5 flex items-center justify-center text-white/5 text-4xl relative overflow-hidden">
                                <i class="fa-solid fa-fingerprint animate-pulse-slow"></i>
                                <div class="absolute inset-0 bg-gradient-to-t from-primary/5 to-transparent"></div>
                            </div>
                            <div>
                                <h4 class="text-white font-black text-lg">Empty Crypt</h4>
                                <p class="text-white/30 text-xs mt-1 font-medium italic">No secured records found in this society segment.</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                let html = '';
                docs.forEach((d, i) => {
                    const date = new Date(d.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    html += `
                        <div class="doc-item glass-card p-5 flex items-center justify-between group hover:border-primary/30 transition-all duration-300" style="animation-delay: ${i * 100}ms">
                            <div class="flex items-center gap-5">
                                <div class="w-14 h-14 rounded-2xl bg-white/5 border border-white/5 text-white/40 flex items-center justify-center text-xl group-hover:bg-primary/10 group-hover:text-primary transition-all duration-500 relative overflow-hidden">
                                    <i class="fa-solid fa-file-contract"></i>
                                    <div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                </div>
                                <div class="max-w-[160px] sm:max-w-none">
                                    <h4 class="text-[13px] font-black text-white group-hover:text-primary transition-colors truncate">${d.documentType}</h4>
                                    <p class="text-[9px] text-white/30 font-bold uppercase tracking-widest mt-1.5 flex items-center gap-2">
                                        <i class="fa-solid fa-calendar-alt text-[8px]"></i> ${date}
                                        <span class="w-1 h-1 rounded-full bg-white/10"></span>
                                        <span class="truncate max-w-[80px]">${d.fileName}</span>
                                    </p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="viewDoc('${d.fileData}', '${d.documentType}')" class="w-11 h-11 rounded-2xl glass-card bg-transparent border-white/5 text-white/30 flex items-center justify-center hover:text-white hover:bg-white/5 hover:border-white/20 transition-all active:scale-90">
                                    <i class="fa-solid fa-eye-slash text-sm group-hover:fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } catch(err) {
                list.innerHTML = `<p class="text-xs text-rose-400 text-center py-10 font-bold uppercase tracking-widest"><i class="fa-solid fa-triangle-exclamation mr-2"></i> Sync Interrupted</p>`;
            }
        }

        function viewDoc(data, type) {
            currentViewData = data;
            currentViewName = type;
            const modal = document.getElementById('previewModal');
            const iframe = document.getElementById('previewIframe');
            
            document.getElementById('previewTitle').innerText = type;
            
            // Show loader/modal
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0', 'translate-y-10');
            }, 10);

            // Load content
            iframe.src = data;
            
            // Disable body scroll
            document.body.style.overflow = 'hidden';
        }

        function closePreview() {
            const modal = document.getElementById('previewModal');
            modal.classList.add('opacity-0', 'translate-y-10');
            document.body.style.overflow = '';
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('previewIframe').src = 'about:blank';
            }, 500);
        }

        function downloadCurrentDoc() {
            if(!currentViewData) return;
            const link = document.createElement('a');
            link.href = currentViewData;
            link.download = `${currentViewName || 'vault_document'}_${Date.now()}`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("Export Initiated", "Secured copy transmitted to local storage.");
        }

        // Initial Data Sync
        fetchDocs();
    </script>
</body>
</html>
